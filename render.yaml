services:
  - type: web
    name: taskbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # set manually in Render dashboard
      - key: WEBHOOK_URL
        sync: false          # set to your Render service URL, e.g. https://taskbot.onrender.com
